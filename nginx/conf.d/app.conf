# nginx/conf.d/app.conf
# ============================================================
# Step 1 — HTTP only (sebelum SSL dikonfigurasi)
# Digunakan untuk Certbot ACME challenge saat pertama kali setup.
# Setelah SSL berhasil, comment blok ini dan uncomment blok HTTPS.
# ============================================================

server {
    listen 80;
    server_name lizzeyyoo.filham.my.id;   # GANTI dengan subdomain kamu

    # Certbot ACME challenge — jangan dihapus
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua HTTP ke HTTPS (aktifkan setelah SSL berhasil)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Sementara forward ke app (hapus/comment setelah SSL aktif)
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

