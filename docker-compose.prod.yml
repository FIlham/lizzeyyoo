version: '3.8'

# ============================================================
# Production Docker Compose — Lizzeyyoo
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # App — TanStack Start production server
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lizzeyyoo_app
    restart: unless-stopped
    env_file:
      - .env.production      # WAJIB: buat file ini di server (lihat .env.production.example)
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    # Tidak expose port ke luar — Nginx yang jadi proxy
    expose:
      - "3000"

  # ----------------------------------------------------------
  # Postgres 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: lizzeyyoo_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    # Tidak expose ke luar — hanya internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lizzeyyoo_redis
    restart: unless-stopped
    env_file:
      - .env.production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Nginx — reverse proxy + SSL termination
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: lizzeyyoo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro          # ACME challenge
      - ./certbot/conf:/etc/letsencrypt:ro          # SSL certificates
    depends_on:
      - app
    networks:
      - app-network

  # ----------------------------------------------------------
  # Certbot — SSL certificate issuer & auto-renewer
  # ----------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: lizzeyyoo_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # Run manually via: docker compose -f docker-compose.prod.yml run --rm certbot <command>
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
